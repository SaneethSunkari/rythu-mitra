<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" rx="24" fill="#EEF6EE"/>
  <rect x="36" y="36" width="1128" height="558" rx="28" fill="#F7FBF7" stroke="#D8E8D8"/>

  <rect x="72" y="72" width="1056" height="230" rx="28" fill="url(#heroGradient)"/>
  <rect x="104" y="108" width="156" height="34" rx="17" fill="rgba(74,222,128,0.12)" stroke="rgba(74,222,128,0.28)"/>
  <text x="182" y="130" text-anchor="middle" fill="#4ADE80" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">Rythu Mitra</text>
  <rect x="272" y="108" width="220" height="34" rx="17" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)"/>
  <text x="382" y="130" text-anchor="middle" fill="rgba(255,255,255,0.72)" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">Nizamabad · Telangana</text>

  <text x="104" y="188" fill="#FFFFFF" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="700">WhatsApp for farmers.</text>
  <text x="104" y="238" fill="#4ADE80" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-style="italic" font-weight="700">Website for everyone else.</text>
  <text x="104" y="274" fill="rgba(255,255,255,0.72)" font-family="Arial, Helvetica, sans-serif" font-size="22">
    Soil, water, district pressure, live mandi signals, weather context,
  </text>
  <text x="104" y="300" fill="rgba(255,255,255,0.72)" font-family="Arial, Helvetica, sans-serif" font-size="22">
    and downside risk before any crop recommendation.
  </text>

  <rect x="90" y="338" width="306" height="182" rx="24" fill="#FFFFFF" stroke="#D8E8D8"/>
  <rect x="446" y="338" width="306" height="182" rx="24" fill="#FFFFFF" stroke="#D8E8D8"/>
  <rect x="802" y="338" width="306" height="182" rx="24" fill="#FFFFFF" stroke="#D8E8D8"/>

  <text x="122" y="376" fill="#4A7A4A" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" letter-spacing="2.2">WHATSAPP BOT</text>
  <text x="122" y="424" fill="#0A1A0A" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700">Farmer voice flow</text>
  <text x="122" y="460" fill="#567256" font-family="Arial, Helvetica, sans-serif" font-size="18">Telugu, low-friction, and built for</text>
  <text x="122" y="486" fill="#567256" font-family="Arial, Helvetica, sans-serif" font-size="18">small farmers who use voice notes.</text>

  <text x="478" y="376" fill="#4A7A4A" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" letter-spacing="2.2">DISTRICT STATE</text>
  <text x="478" y="424" fill="#0A1A0A" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700">Pressure rails + open lanes</text>
  <text x="478" y="460" fill="#567256" font-family="Arial, Helvetica, sans-serif" font-size="18">Shows where the engine is still willing</text>
  <text x="478" y="486" fill="#567256" font-family="Arial, Helvetica, sans-serif" font-size="18">to move and where it already pulls back.</text>

  <text x="834" y="376" fill="#4A7A4A" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" letter-spacing="2.2">MARKETS + WEATHER</text>
  <text x="834" y="424" fill="#0A1A0A" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700">Live trade context</text>
  <text x="834" y="460" fill="#567256" font-family="Arial, Helvetica, sans-serif" font-size="18">Regional mandi rows, crop spots,</text>
  <text x="834" y="486" fill="#567256" font-family="Arial, Helvetica, sans-serif" font-size="18">and the district weather stream.</text>

  <defs>
    <linearGradient id="heroGradient" x1="72" y1="72" x2="1128" y2="302" gradientUnits="userSpaceOnUse">
      <stop stop-color="#081408"/>
      <stop offset="0.55" stop-color="#0C200D"/>
      <stop offset="1" stop-color="#132515"/>
    </linearGradient>
  </defs>
</svg>
