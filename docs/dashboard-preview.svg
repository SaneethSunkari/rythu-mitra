<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" rx="28" fill="#EEF6EE"/>
  <rect x="28" y="28" width="1144" height="704" rx="30" fill="#F7FBF7" stroke="#D8E8D8"/>

  <rect x="58" y="52" width="1084" height="56" rx="18" fill="rgba(247,251,247,0.92)" stroke="#DFEBDD"/>
  <text x="88" y="86" fill="#0A1A0A" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Rythu <tspan fill="#16A34A">Mitra</tspan></text>
  <text x="778" y="86" fill="#567256" font-family="Arial, Helvetica, sans-serif" font-size="16">How it works</text>
  <text x="896" y="86" fill="#567256" font-family="Arial, Helvetica, sans-serif" font-size="16">WhatsApp</text>
  <text x="999" y="86" fill="#567256" font-family="Arial, Helvetica, sans-serif" font-size="16">FAQ</text>
  <rect x="1050" y="66" width="70" height="28" rx="14" fill="#16A34A"/>
  <text x="1085" y="85" text-anchor="middle" fill="#F7FFF7" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">Open</text>

  <rect x="58" y="132" width="1084" height="228" rx="28" fill="url(#heroGradient)"/>
  <rect x="92" y="168" width="118" height="32" rx="16" fill="rgba(74,222,128,0.12)" stroke="rgba(74,222,128,0.28)"/>
  <text x="151" y="188" text-anchor="middle" fill="#4ADE80" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">Rythu Mitra</text>
  <rect x="222" y="168" width="174" height="32" rx="16" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)"/>
  <text x="309" y="188" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">Nizamabad · Telangana</text>

  <text x="92" y="244" fill="#FFFFFF" font-family="Georgia, 'Times New Roman', serif" font-size="54" font-weight="700">A crop advisor built for</text>
  <text x="92" y="296" fill="#4ADE80" font-family="Georgia, 'Times New Roman', serif" font-size="54" font-style="italic" font-weight="700">real uncertainty.</text>
  <text x="92" y="330" fill="rgba(255,255,255,0.72)" font-family="Arial, Helvetica, sans-serif" font-size="19">
    Small farmers send a Telugu voice note on WhatsApp and get a recommendation
  </text>
  <text x="92" y="355" fill="rgba(255,255,255,0.72)" font-family="Arial, Helvetica, sans-serif" font-size="19">
    that accounts for soil, water, district supply crowding, price ranges, and downside risk.
  </text>

  <rect x="768" y="196" width="150" height="42" rx="21" fill="#16A34A"/>
  <text x="843" y="223" text-anchor="middle" fill="#F7FFF7" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">Open analysis tool</text>
  <rect x="932" y="196" width="136" height="42" rx="21" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)"/>
  <text x="1000" y="223" text-anchor="middle" fill="#F4FFF4" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">See how it works</text>

  <rect x="92" y="378" width="140" height="32" rx="16" fill="rgba(255,255,255,0.08)"/>
  <rect x="244" y="378" width="162" height="32" rx="16" fill="rgba(255,255,255,0.08)"/>
  <rect x="418" y="378" width="174" height="32" rx="16" fill="rgba(255,255,255,0.08)"/>
  <rect x="604" y="378" width="148" height="32" rx="16" fill="rgba(255,255,255,0.08)"/>
  <rect x="764" y="378" width="172" height="32" rx="16" fill="rgba(255,255,255,0.08)"/>
  <text x="162" y="399" text-anchor="middle" fill="#F2FFF2" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">36 mandals covered</text>
  <text x="325" y="399" text-anchor="middle" fill="#F2FFF2" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">6 mandi price feeds</text>
  <text x="505" y="399" text-anchor="middle" fill="#F2FFF2" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">5-filter constraint engine</text>
  <text x="678" y="399" text-anchor="middle" fill="#F2FFF2" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">Telugu voice-first</text>
  <text x="850" y="399" text-anchor="middle" fill="#F2FFF2" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">district supply tracking</text>

  <text x="70" y="454" fill="#4A7A4A" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" letter-spacing="2.4">HOW IT WORKS</text>
  <text x="70" y="490" fill="#0A1A0A" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700">Five filters. Every recommendation survives all five.</text>

  <rect x="70" y="514" width="196" height="118" rx="22" fill="#FFFFFF" stroke="#D8E8D8"/>
  <rect x="282" y="514" width="196" height="118" rx="22" fill="#FFFFFF" stroke="#D8E8D8"/>
  <rect x="494" y="514" width="196" height="118" rx="22" fill="#FFFFFF" stroke="#D8E8D8"/>
  <rect x="706" y="514" width="196" height="118" rx="22" fill="#FFFFFF" stroke="#D8E8D8"/>
  <rect x="918" y="514" width="196" height="118" rx="22" fill="#FFFFFF" stroke="#D8E8D8"/>

  <circle cx="108" cy="552" r="14" fill="#16A34A"/>
  <circle cx="320" cy="552" r="14" fill="#0891B2"/>
  <circle cx="532" cy="552" r="14" fill="#D97706"/>
  <circle cx="744" cy="552" r="14" fill="#7C3AED"/>
  <circle cx="956" cy="552" r="14" fill="#DC2626"/>

  <text x="108" y="557" text-anchor="middle" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">1</text>
  <text x="320" y="557" text-anchor="middle" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">2</text>
  <text x="532" y="557" text-anchor="middle" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">3</text>
  <text x="744" y="557" text-anchor="middle" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">4</text>
  <text x="956" y="557" text-anchor="middle" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700">5</text>

  <text x="132" y="556" fill="#0A1A0A" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Soil fit</text>
  <text x="344" y="556" fill="#0A1A0A" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Water + weather</text>
  <text x="556" y="556" fill="#0A1A0A" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">District pressure</text>
  <text x="768" y="556" fill="#0A1A0A" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Price range</text>
  <text x="980" y="556" fill="#0A1A0A" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Downside</text>

  <text x="94" y="585" fill="#567256" font-family="Arial, Helvetica, sans-serif" font-size="14">Rejects crops that</text>
  <text x="94" y="605" fill="#567256" font-family="Arial, Helvetica, sans-serif" font-size="14">do not match the mandal.</text>

  <text x="306" y="585" fill="#567256" font-family="Arial, Helvetica, sans-serif" font-size="14">Checks source risk</text>
  <text x="306" y="605" fill="#567256" font-family="Arial, Helvetica, sans-serif" font-size="14">and live weather context.</text>

  <text x="518" y="585" fill="#567256" font-family="Arial, Helvetica, sans-serif" font-size="14">Blocks oversupplied</text>
  <text x="518" y="605" fill="#567256" font-family="Arial, Helvetica, sans-serif" font-size="14">district crop lanes.</text>

  <text x="730" y="585" fill="#567256" font-family="Arial, Helvetica, sans-serif" font-size="14">Uses floor, average,</text>
  <text x="730" y="605" fill="#567256" font-family="Arial, Helvetica, sans-serif" font-size="14">and ceiling price bands.</text>

  <text x="942" y="585" fill="#567256" font-family="Arial, Helvetica, sans-serif" font-size="14">Keeps only crops that</text>
  <text x="942" y="605" fill="#567256" font-family="Arial, Helvetica, sans-serif" font-size="14">survive the downside.</text>

  <defs>
    <linearGradient id="heroGradient" x1="58" y1="132" x2="1142" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#081408"/>
      <stop offset="0.55" stop-color="#0C200D"/>
      <stop offset="1" stop-color="#132515"/>
    </linearGradient>
  </defs>
</svg>
